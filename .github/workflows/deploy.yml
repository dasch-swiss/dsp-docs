name: deploy

on:
  push:
    branches: 
        - main

jobs:
  deploy:
    if: startsWith(github.event.head_commit.message, 'deploy')
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Authenticate with GitHub
        env:
          GH_PAT: ${{ secrets.DASCHBOT_PAT }}
        run: |
          echo "https://${GH_PAT}:@github.com" > ~/.git-credentials
          git config --global credential.helper store
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessary for git-revision-date-localized-plugin
          submodules: 'recursive'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: sudo apt-get install graphviz
      - name: build graphviz figures
        run: make graphvizfigures
      - name: Deploy docs
        run: make deploy

  send-chat-notification:
    name: Send google chat notification
    needs: [deploy]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.event.head_commit.message, 'deploy')
    steps:
      - name: Extract DSP from commit subject
        id: dsp
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          dsp=$(echo "$MSG" | sed -nE 's/^deploy: bump docs to ([0-9]{4}\.[0-9]{2}\.[0-9]{2}).*$/\1/p')
          [[ -n "$dsp" ]] || dsp='(unknown)'
          echo "value=$dsp" >> "$GITHUB_OUTPUT"
      - name: Send notification to google chat room "DSP releases"
        uses: google-github-actions/send-google-chat-webhook@v0.0.4
        with:
          webhook_url: ${{ secrets.GOOGLE_CHAT_DSP_RELEASES_WEBHOOK_URL }}
          mention: '<users/all>'
          text: '📚 *DSP-DOCS* ${{ steps.dsp.outputs.value }} released\n\n<https://docs.dasch.swiss/${{ steps.dsp.outputs.value }}/|Live docs>'

  notify-failure:
    name: Notify on deploy failure (internal)
    needs: [deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Post failure alert
        env:
          INTERNAL_WEBHOOK: ${{ secrets.GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          run_url="https://github.com/$REPO/actions/runs/$RUN_ID"
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d "$(jq -n --arg text "❌ dsp-docs deploy.yml failed for '$MSG' · <$run_url|view run>" '{text:$text}')" \
            "$INTERNAL_WEBHOOK"
