name: deploy

on:
  push:
    branches: 
        - main

jobs:
  deploy:
    if: startsWith(github.event.head_commit.message, 'deploy')
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Authenticate with GitHub
        env:
          GH_PAT: ${{ secrets.DASCHBOT_PAT }}
        run: |
          echo "https://${GH_PAT}:@github.com" > ~/.git-credentials
          git config --global credential.helper store
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessary for git-revision-date-localized-plugin
          submodules: 'recursive'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: sudo apt-get install graphviz
      - name: build graphviz figures
        run: make graphvizfigures
      - name: Deploy docs
        run: make deploy

  # The public release announcement is posted by announce-release.yml, which
  # triggers on the github-pages `deployment_status == success` event — i.e.
  # only once the site is actually live. See that workflow for details.

  notify-failure:
    name: Notify on deploy failure (internal)
    needs: [deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Post failure alert
        env:
          INTERNAL_WEBHOOK: ${{ secrets.GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          run_url="https://github.com/$REPO/actions/runs/$RUN_ID"
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d "$(jq -n --arg text "❌ dsp-docs deploy.yml failed for '$MSG' · <$run_url|view run>" '{text:$text}')" \
            "$INTERNAL_WEBHOOK"
