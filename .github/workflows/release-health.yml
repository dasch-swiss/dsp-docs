name: Release health

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC — offset to dodge top-of-hour cron herd
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  health:
    name: Release health checks
    runs-on: ubuntu-latest
    steps:
      - name: Mint DaSCH Bot App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DASCH_BOT_APP_ID }}
          private-key: ${{ secrets.DASCH_BOT_APP_PRIVATE_KEY }}
          owner: dasch-swiss
          repositories: |
            dsp-docs
            dsp-tools
          permission-contents: read
          permission-pull-requests: read
          permission-issues: write

      - name: Run release-health checks
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Idempotent label creation: list existing first, create only the missing.
          # `gh label create ... || true` would also swallow auth / rate-limit errors,
          # so we list-then-create to let real failures fall through `set -e`.
          existing=$(gh api repos/dasch-swiss/dsp-docs/labels --paginate --jq '.[].name')
          for L in release-automation health-check auto-opened severity:warning severity:critical; do
            if ! grep -qFx "$L" <<<"$existing"; then
              gh label create "$L" --color ededed --description "release-health"
            fi
          done

          alert() {
            local text="$1"
            curl -fsSL -X POST -H 'Content-Type: application/json' \
              -d "$(jq -n --arg text "$text" '{text:$text}')" \
              "$GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL" >/dev/null
          }

          # Find-or-create an issue with stable title; refresh body on subsequent ticks.
          # Posts Chat alert only on first detection (issue creation). The chat message
          # includes the issue URL, the diagnostic detail, the cron run URL, and an
          # optional context link (e.g. failing PR or deploy run).
          # Usage: ensure_issue <title> <detail> [extra_link_url] [extra_link_label]
          ensure_issue() {
            local title="$1"
            local detail="$2"
            local extra_url="${3:-}"
            local extra_label="${4:-}"

            local body
            body=$(build_body "$detail")

            local existing
            existing=$(gh issue list --repo dasch-swiss/dsp-docs \
              --state open \
              --label auto-opened \
              --search "\"$title\" in:title" \
              --json number,title \
              | jq -r --arg t "$title" '.[] | select(.title == $t) | .number' \
              | head -n1)

            if [[ -z "$existing" ]]; then
              local issue_url
              issue_url=$(gh issue create --repo dasch-swiss/dsp-docs \
                      --title "$title" --body "$body" \
                      --label release-automation,health-check,auto-opened,severity:warning)
              local issue_num="${issue_url##*/}"

              local links="<$issue_url|Issue #$issue_num> · <$RUN_URL|Health run>"
              if [[ -n "$extra_url" ]]; then
                links="$links · <$extra_url|$extra_label>"
              fi
              local chat_text
              chat_text=$(printf '❗ *%s*\n%s\n🔗 %s' "$title" "$detail" "$links")
              alert "$chat_text"
              echo "$issue_num"
            else
              gh issue edit "$existing" --repo dasch-swiss/dsp-docs --body "$body" >/dev/null
              echo "$existing"
            fi
          }

          # Close an open issue if no `keep-open` label is present.
          clear_issue() {
            local title="$1"
            local num
            num=$(gh issue list --repo dasch-swiss/dsp-docs \
              --state open \
              --label auto-opened \
              --search "\"$title\" in:title" \
              --json number,title \
              | jq -r --arg t "$title" '.[] | select(.title == $t) | .number' \
              | head -n1)
            [[ -z "$num" ]] && return 0
            if ! gh issue view "$num" --repo dasch-swiss/dsp-docs --json labels --jq '.labels[].name' | grep -q '^keep-open$'; then
              gh issue close "$num" --repo dasch-swiss/dsp-docs --reason completed \
                --comment "Condition cleared at $NOW (run $RUN_URL). Auto-closed by release-health."
            fi
          }

          build_body() {
            local detail="$1"
            cat <<EOF
          <!-- release-health:state -->
          **Detected at:** $NOW
          **Run:** $RUN_URL

          $detail

          ---
          *Body below the marker is rewritten by release-health on each tick. Human edits should go above this marker.*
          EOF
          }

          # ---- Inputs: parse release.mk on main ----
          RELEASE_MK=$(gh api repos/dasch-swiss/dsp-docs/contents/release.mk --jq '.content' | base64 -d)
          parse_mk() { echo "$RELEASE_MK" | sed -nE "s/^$1[[:space:]]*:?=[[:space:]]*\"?([^\"[:space:]]+)\"?.*$/\1/p"; }
          MK_DSP=$(parse_mk DSP)
          MK_TOOLS=$(parse_mk TOOLS)

          # ---- Inputs: latest dsp-tools release ----
          TOOLS_LATEST=$(gh api repos/dasch-swiss/dsp-tools/releases/latest \
                           --jq '{tag: .tag_name, published_at: .published_at}')
          TOOLS_TAG=$(echo "$TOOLS_LATEST" | jq -r .tag)
          TOOLS_PUBLISHED=$(echo "$TOOLS_LATEST" | jq -r .published_at)
          TOOLS_AGE_HOURS=$(( ( $(date -u +%s) - $(date -u -d "$TOOLS_PUBLISHED" +%s) ) / 3600 ))

          # ---- Inputs: live docs versions.json (defensive parsing) ----
          # Single issue carrying the failure mode in its body — ensure_issue refreshes
          # the body on subsequent ticks, so transitions (unreachable → not-JSON → ...)
          # update the open issue rather than spawning a new one per mode.
          LIVE_DSP=""
          LIVE_TITLE="[release-health] versions.json health"

          TMP=$(mktemp)
          if ! curl -fsSL --max-time 30 -o "$TMP" "https://docs.dasch.swiss/versions.json"; then
            ensure_issue "$LIVE_TITLE" "curl failed against https://docs.dasch.swiss/versions.json" >/dev/null
          elif ! jq empty <"$TMP" 2>/dev/null; then
            ensure_issue "$LIVE_TITLE" "got non-JSON body (truncated 200B): $(head -c 200 "$TMP")" >/dev/null
          else
            LIVE_DSP=$(jq -r '
              map(select((.aliases // []) | index("latest"))) |
              if length == 0 then "" else .[0].version end
            ' <"$TMP")
            if [[ -z "$LIVE_DSP" ]]; then
              ensure_issue "$LIVE_TITLE" "no version aliased latest in versions.json" >/dev/null
            else
              clear_issue "$LIVE_TITLE"
            fi
          fi
          rm -f "$TMP"

          # ---- REQ-6.4: Bump missing ----
          # dsp-tools published >24h ago but release.mk hasn't caught up.
          # Trade-off: if the upstream chore(start-stack) step is itself the bottleneck,
          # this fires a transient false positive that clears on the next cron tick.
          BUMP_MISSING_TITLE="[release-health] Bump missing for dsp-tools $TOOLS_TAG"
          if [[ "$MK_TOOLS" != "$TOOLS_TAG" && "$TOOLS_AGE_HOURS" -gt 24 ]]; then
            TOOLS_RELEASE_URL="https://github.com/dasch-swiss/dsp-tools/releases/tag/$TOOLS_TAG"
            ensure_issue "$BUMP_MISSING_TITLE" \
              "dsp-tools $TOOLS_TAG published $TOOLS_AGE_HOURS h ago; release.mk.TOOLS=$MK_TOOLS, release.mk.DSP=$MK_DSP" \
              "$TOOLS_RELEASE_URL" "dsp-tools $TOOLS_TAG" >/dev/null
          else
            clear_issue "$BUMP_MISSING_TITLE"
          fi

          # ---- REQ-6.3: PR stuck (>24h open) ----
          gh pr list --repo dasch-swiss/dsp-docs --state open --search '"deploy: bump docs" in:title' \
            --json number,title,createdAt,url \
            | jq -c '.[] | select((now - (.createdAt | fromdate)) > 86400)' \
            | while read -r pr; do
                num=$(echo "$pr" | jq -r .number)
                ptitle=$(echo "$pr" | jq -r .title)
                purl=$(echo "$pr" | jq -r .url)
                stuck_title="[release-health] PR stuck: $ptitle (#$num)"
                ensure_issue "$stuck_title" \
                  "PR open >24h: $purl" \
                  "$purl" "PR #$num" >/dev/null
              done

          # ---- REQ-6.5: Publish gap ----
          GAP_TITLE="[release-health] Publish gap: release.mk DSP vs live"
          if [[ -n "$LIVE_DSP" && "$MK_DSP" != "$LIVE_DSP" ]]; then
            ensure_issue "$GAP_TITLE" \
              "release.mk DSP=$MK_DSP, live=$LIVE_DSP" >/dev/null
          else
            clear_issue "$GAP_TITLE"
          fi

      - name: Notify on release-health self-failure (internal)
        if: failure()
        env:
          INTERNAL_WEBHOOK: ${{ secrets.GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          run_url="https://github.com/$REPO/actions/runs/$RUN_ID"
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d "$(jq -n --arg text "❌ release-health.yml itself failed · <$run_url|view run>" '{text:$text}')" \
            "$INTERNAL_WEBHOOK"
