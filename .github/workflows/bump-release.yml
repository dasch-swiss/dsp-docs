name: Bump release

on:
  workflow_dispatch:
    inputs:
      dsp:
        description: 'DSP platform release (YYYY.MM.DD)'
        type: string
        required: true
      api:
        description: 'dsp-api tag (e.g. v35.8.1)'
        type: string
        required: true
      app:
        description: 'dsp-app tag (e.g. v13.3.0)'
        type: string
        required: true
      tools:
        description: 'dsp-tools tag (e.g. v18.14.0)'
        type: string
        required: true
      meta:
        description: 'dsp-meta tag (defaults to latest release)'
        type: string
        required: false
      release_url:
        description: 'Triggering dsp-tools release URL (manual: omit)'
        type: string
        required: false

permissions: {}

# Per-DSP group lets unrelated DSPs run in parallel; same-DSP dispatches serialise.
# Queue holds ONE slot: a third dispatch evicts the second pending run.
concurrency:
  group: bump-release-${{ inputs.dsp }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump release
    runs-on: ubuntu-latest
    steps:
      - name: Mint DaSCH Bot App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DASCH_BOT_APP_ID }}
          private-key: ${{ secrets.DASCH_BOT_APP_PRIVATE_KEY }}
          owner: dasch-swiss
          repositories: |
            dsp-docs
            dsp-api
            dsp-app
            dsp-tools
            dsp-meta
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout dsp-docs with submodules
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true

      - name: Bump release.mk and submodule pointers
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DSP_INPUT: ${{ inputs.dsp }}
          API_INPUT: ${{ inputs.api }}
          APP_INPUT: ${{ inputs.app }}
          TOOLS_INPUT: ${{ inputs.tools }}
          META_INPUT: ${{ inputs.meta }}
          RELEASE_URL: ${{ inputs.release_url }}
          RUN_ID: ${{ github.run_id }}
          APP_ID: ${{ vars.DASCH_BOT_APP_ID }}
          BUMP_ENABLED: ${{ vars.BUMP_RELEASE_ENABLED }}
          INTERNAL_WEBHOOK: ${{ secrets.GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          # 0. Kill switch
          if [[ "$BUMP_ENABLED" == "false" ]]; then
            echo "::notice::BUMP_RELEASE_ENABLED=false, skipping"
            exit 0
          fi

          # 1. Resolve META if not provided
          META="$META_INPUT"
          if [[ -z "$META" ]]; then
            META=$(gh api repos/dasch-swiss/dsp-meta/releases/latest --jq .tag_name)
            echo "::notice::Resolved META=$META"
          fi

          # 2. Validate DSP format
          if [[ ! "$DSP_INPUT" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "::error::Invalid DSP format: $DSP_INPUT"
            exit 1
          fi

          # 3. Validate tag existence for each repo
          for spec in "dsp-api/$API_INPUT" "dsp-app/$APP_INPUT" \
                      "dsp-tools/$TOOLS_INPUT" "dsp-meta/$META"; do
            repo="${spec%%/*}"
            tag="${spec#*/}"
            if ! gh api "repos/dasch-swiss/${repo}/git/ref/tags/${tag}" --silent 2>/dev/null; then
              echo "::error::Tag not found: ${repo}/${tag}"
              exit 1
            fi
          done

          # 4. Render release.mk and update submodule pointers
          ./scripts/render-release-mk.sh \
            --dsp "$DSP_INPUT" --api "$API_INPUT" \
            --app "$APP_INPUT" --tools "$TOOLS_INPUT" --meta "$META" \
            > release.mk
          make update-submodules

          # 5. Apply-then-diff idempotency
          if git diff --quiet HEAD --ignore-submodules=dirty -- .; then
            echo "::notice::No-op — release.mk and submodules already current"
            exit 0
          fi

          # 6. Standard branch + title
          branch="deploy/bump-docs-$DSP_INPUT"
          title="deploy: bump docs to $DSP_INPUT"

          # 7. Stale-branch preflight: delete orphan remote branches with no open PR
          if git ls-remote --exit-code origin "$branch" >/dev/null 2>&1; then
            open_count=$(gh pr list --head "$branch" --state open --json number --jq 'length')
            if [[ "$open_count" == "0" ]]; then
              echo "::notice::Stale branch $branch with no open PR — deleting"
              git push origin --delete "$branch"
            fi
          fi

          # 8. Open-PR guard
          if [[ $(gh pr list --head "$branch" --state open --json number --jq 'length') -gt 0 ]]; then
            echo "::notice::Open PR already exists on $branch"
            exit 0
          fi

          # 9. Commit, branch, push (fail loudly on non-FF so step 9b can recover)
          git config user.name  'dasch-bot-app[bot]'
          git config user.email "${APP_ID}+dasch-bot-app[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add release.mk dsp/
          git commit -m "$title"
          push_failed=0
          git push origin "$branch" || push_failed=1
          if [[ "$push_failed" == "1" ]]; then
            if [[ $(gh pr list --head "$branch" --state open --json number --jq 'length') -gt 0 ]]; then
              echo "::notice::Concurrent run already opened PR on $branch — treating as no-op"
              exit 0
            fi
            exit 1
          fi

          # 9b. Build PR body
          pr_body=$(cat <<EOF
          Auto-generated by \`.github/workflows/bump-release.yml\`.

          | Component | Version |
          |---|---|
          | DSP    | $DSP_INPUT |
          | API    | $API_INPUT |
          | APP    | $APP_INPUT |
          | TOOLS  | $TOOLS_INPUT |
          | META   | $META |

          Triggered by: ${RELEASE_URL:-manual workflow_dispatch}
          Run: https://github.com/dasch-swiss/dsp-docs/actions/runs/$RUN_ID
          EOF
          )

          # 9c. Create PR (idempotent on "already exists")
          pr_url=""
          if create_out=$(gh pr create --head "$branch" --base main \
                            --title "$title" --body "$pr_body" 2>&1); then
            pr_url="$create_out"
          else
            if grep -q "already exists" <<<"$create_out"; then
              echo "::notice::PR already exists (peer run): $create_out"
              pr_url=$(grep -oE 'https://github\.com/[^ ]+' <<<"$create_out" | head -1)
            else
              echo "$create_out" >&2
              exit 1
            fi
          fi

          # 9d. Enable auto-merge (idempotent)
          if ! gh pr merge --auto --squash "$pr_url"; then
            echo "::warning::auto-merge enable failed; verifying state"
            gh pr view "$pr_url" --json autoMergeRequest --jq .autoMergeRequest || true
          fi

          # 10. L2 informational alert — internal channel sees the bump PR pending merge
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d "$(jq -n --arg text "📚 bump-release.yml opened bump PR for DSP=$DSP_INPUT (TOOLS=$TOOLS_INPUT) · <$pr_url|view PR>" '{text:$text}')" \
            "$INTERNAL_WEBHOOK"

      - name: Notify on failure (internal)
        if: failure()
        env:
          INTERNAL_WEBHOOK: ${{ secrets.GOOGLE_CHAT_DSP_RELEASE_INTERNAL_WEBHOOK_URL }}
          DSP_INPUT: ${{ inputs.dsp }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          run_url="https://github.com/$REPO/actions/runs/$RUN_ID"
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            -d "$(jq -n --arg text "❌ bump-release.yml failed for DSP=$DSP_INPUT · <$run_url|view run>" '{text:$text}')" \
            "$INTERNAL_WEBHOOK"
